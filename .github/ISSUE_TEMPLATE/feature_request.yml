name: 功能建议
description: 提出一个想法或改进建议
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        欢迎提出功能建议。请尽量描述清楚问题背景、目标用户和预期收益。✨
  - type: textarea
    id: problem
    attributes:
      label: 你想解决什么问题？
      description: 请描述当前体验中的缺口或痛点
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 你的建议方案
      description: 可以描述交互、页面、数据流或行为变化
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 你考虑过哪些替代方案？
      description: 如果有，请写出来，方便比较
  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 包括示例、截图、参考链接或使用场景
